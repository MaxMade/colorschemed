# Placeholder mappings
# 
# The [Mappings] section defines case-sensitive keys that map to a pair of
# values used depending on the current theme or mode:
# - light: value used in light mode
# - dark: value used in dark mode
#
# Keys are case-sensitive and may define different formatting variants.

# Uppercase variant of "mode"
[Mappings.MODE]
light = "LIGHT"
dark = "DARK"

# Title-case variant of "mode"
[Mappings.Mode]
light = "Light"
dark = "Dark"

# Lowercase variant of "mode"
[Mappings.mode]
light = "light"
dark = "dark"


# Command configuration
# 
# Controls how commands are executed and whether confirmation is required.
[Commands]

# If true, the user will be prompted before executing any command.
# 
# Default: false
ask-before = false

# List of commands.
# 
# Default: []
commands = [
  'sed -i "s/_\(dark\|light\)\.toml/_{{-mode-}}.toml/" $HOME/.config/alacritty/alacritty.toml', # Update allacrity configuration
  'sed -i "s/_\(dark\|light\)/_{{-mode-}}/" $HOME/.config/helix/config.toml', # Update helix configuration
  'sed -i "s/vim.opt.background\s*=\s*\"\(dark\|light\)\"/vim.opt.background=\"{{-mode-}}\"/" $HOME/.config/nvim/init.lua', # Update neovim configuration
  'sed -i "s/set background\s*=\s*\(dark\|light\)/set background={{-mode-}}/" $HOME/.vimrc', # Update vim configuration
]

